services:
  postgres:
    image: postgres:16
    container_name: arventa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: arventatrade
      POSTGRES_USER: arventa
      POSTGRES_PASSWORD: arventa123
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: arventa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
