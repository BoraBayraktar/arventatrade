services:
  postgres:
    image: postgres:16
    container_name: arventa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: arventatrade
      POSTGRES_USER: arventa
      POSTGRES_PASSWORD: arventa123
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: arventa-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: arventa-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: arventa-minio-init
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        sleep 1;
      done;
      mc mb -p local/arventa-media || true;
      mc anonymous set download local/arventa-media;
      "

volumes:
  pg_data:
  redis_data:
  minio_data:
